name: Build Linux Binary

on:
  workflow_dispatch:
    inputs:
      target:
        description: Linux target to build
        type: choice
        required: true
        default: linux_amd64
        options:
          - linux_amd64
          - linux_arm64
          - linux_armv7
          - all

jobs:
  build:
    name: Build ${{ inputs.target }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.5'
          cache: true

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      - name: Build
        shell: bash
        run: |
          set -euxo pipefail
          case "${{ inputs.target }}" in
            linux_amd64)
              make linux_amd64
              ;;
            linux_arm64)
              make linux_arm64
              ;;
            linux_armv7)
              make linux_armv7
              ;;
            all)
              make linux_amd64 linux_arm64 linux_armv7
              ;;
          esac

      - name: Package
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          for dir in out/linux_*; do
            [ -d "$dir" ] || continue
            target="$(basename "$dir")"
            tar -C "$dir" -czf "dist/yarr_${target}.tar.gz" yarr
          done
          ls -lh dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yarr-${{ inputs.target }}
          path: dist/*.tar.gz
          if-no-files-found: error
